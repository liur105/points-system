<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户积分系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .user-info {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .user-info h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .user-detail {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .login-status {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 用户积分系统</h1>
        
        <!-- 登录状态栏 -->
        <div class="login-status" id="loginStatus">
            <span>⚡ 当前状态：未登录</span>
            <button class="logout-btn" onclick="logout()" style="display: none;">退出登录</button>
        </div>
        
        <div class="cards">
            <!-- 登录卡片 -->
            <div class="card">
                <h2>🔐 用户登录</h2>
                <div class="input-group">
                    <label>用户ID</label>
                    <input type="number" id="loginUserId" placeholder="请输入用户ID">
                </div>
                <button onclick="login()">登录</button>
                <div id="loginResult" class="result"></div>
            </div>

            <!-- 注册卡片 -->
            <div class="card">
                <h2>📝 用户注册</h2>
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="regName" placeholder="请输入用户名">
                </div>
                <button onclick="register()">立即注册</button>
                <div id="regResult" class="result"></div>
            </div>

            <!-- 签到卡片 -->
            <div class="card">
                <h2>⭐ 每日签到</h2>
                <div class="input-group">
                    <label>用户ID</label>
                    <input type="number" id="signUserId" placeholder="请输入用户ID">
                </div>
                <button onclick="sign()">签到打卡</button>
                <div id="signResult" class="result"></div>
            </div>

            <!-- 查询卡片 -->
            <div class="card">
                <h2>🔍 查询用户</h2>
                <div class="input-group">
                    <label>用户ID</label>
                    <input type="number" id="queryUserId" placeholder="请输入用户ID">
                </div>
                <button onclick="queryUser()">查询信息</button>
                <div id="queryResult" class="result"></div>
            </div>
        </div>

        <!-- 用户信息展示 -->
        <div class="user-info">
            <h2>👤 用户信息展示</h2>
            <div id="userDetail" class="user-detail">请先登录，然后点击"查询信息"按钮查看用户详情</div>
        </div>
    </div>

    <script>
        // API 基础地址
        const API_BASE = 'http://localhost:8080/user';
        
        // 当前登录的用户ID
        let currentUserId = null;

        // 通用请求方法（自动携带登录信息）
        async function request(url, method = 'GET', body = null) {
            const headers = {
                'Content-Type': 'application/json',
            };
            
            // 如果已登录，在请求头中携带 X-UserId
            if (currentUserId) {
                headers['X-UserId'] = currentUserId;
            }
            
            const options = {
                method: method,
                headers: headers,
            };
            
            if (body && method !== 'GET') {
                options.body = JSON.stringify(body);
            }
            
            return fetch(url, options);
        }

        // 更新登录状态栏
        function updateLoginStatus() {
            const statusDiv = document.getElementById('loginStatus');
            const logoutBtn = statusDiv.querySelector('.logout-btn');
            if (currentUserId) {
                statusDiv.innerHTML = `<span>✅ 已登录，用户ID: ${currentUserId}</span>`;
                statusDiv.appendChild(logoutBtn);
                logoutBtn.style.display = 'block';
            } else {
                statusDiv.innerHTML = `<span>⚡ 当前状态：未登录</span>`;
                statusDiv.appendChild(logoutBtn);
                logoutBtn.style.display = 'none';
            }
        }

        // 退出登录
        function logout() {
            currentUserId = null;
            updateLoginStatus();
            document.getElementById('loginUserId').value = '';
            document.getElementById('signUserId').value = '';
            document.getElementById('queryUserId').value = '';
            document.getElementById('userDetail').innerHTML = '请先登录，然后点击"查询信息"按钮查看用户详情';
            document.getElementById('loginResult').innerHTML = '已退出登录';
            document.getElementById('loginResult').className = 'result success';
        }

        // 登录
        async function login() {
            const userId = document.getElementById('loginUserId').value;
            const resultDiv = document.getElementById('loginResult');
            
            if (!userId) {
                showResult(resultDiv, '请输入用户ID', false);
                return;
            }

            resultDiv.innerHTML = '⏳ 验证中...';
            resultDiv.className = 'result';

            try {
                const response = await request(`${API_BASE}/${userId}`, 'GET');
                
                if (response.ok) {
                    const user = await response.json();
                    currentUserId = userId;
                    updateLoginStatus();
                    showResult(resultDiv, `✅ 登录成功！欢迎回来，${user.name}`, true);
                    // 自动填充到签到和查询框
                    document.getElementById('signUserId').value = userId;
                    document.getElementById('queryUserId').value = userId;
                    // 自动查询用户信息
                    queryUser();
                } else if (response.status === 401) {
                    showResult(resultDiv, '❌ 登录失败：请检查用户ID是否正确', false);
                } else {
                    showResult(resultDiv, '❌ 用户不存在，请先注册', false);
                }
            } catch (error) {
                showResult(resultDiv, `❌ 网络错误: ${error.message}`, false);
            }
        }

        // 注册用户
        async function register() {
            const name = document.getElementById('regName').value.trim();
            const resultDiv = document.getElementById('regResult');
            
            if (!name) {
                showResult(resultDiv, '请输入用户名', false);
                return;
            }

            resultDiv.innerHTML = '⏳ 注册中...';
            resultDiv.className = 'result';

            try {
                const response = await fetch(`${API_BASE}/register?name=${encodeURIComponent(name)}`, {
                    method: 'POST'
                });
                
                const text = await response.text();
                
                if (response.ok) {
                    showResult(resultDiv, `✅ ${text}`, true);
                    // 提取用户ID并自动填充到登录、签到和查询框
                    const match = text.match(/用户ID: (\d+)/);
                    if (match) {
                        const newUserId = match[1];
                        document.getElementById('loginUserId').value = newUserId;
                        document.getElementById('signUserId').value = newUserId;
                        document.getElementById('queryUserId').value = newUserId;
                        // 提示登录
                        showResult(resultDiv, `✅ 注册成功！用户ID: ${newUserId}，请点击"登录"按钮登录`, true);
                    }
                } else {
                    showResult(resultDiv, `❌ 注册失败: ${text}`, false);
                }
            } catch (error) {
                showResult(resultDiv, `❌ 网络错误: ${error.message}`, false);
            }
        }

        // 签到
        async function sign() {
            const userId = document.getElementById('signUserId').value;
            const resultDiv = document.getElementById('signResult');
            
            if (!userId) {
                showResult(resultDiv, '请输入用户ID', false);
                return;
            }

            // 如果登录的用户ID与签到用户ID不一致，提示错误
            if (currentUserId && currentUserId !== userId) {
                showResult(resultDiv, `⚠️ 当前登录用户是 ${currentUserId}，请签到自己的账号`, false);
                return;
            }

            resultDiv.innerHTML = '⏳ 签到中...';
            resultDiv.className = 'result';

            try {
                const response = await request(`${API_BASE}/sign?userId=${userId}`, 'POST');
                const text = await response.text();
                
                if (response.ok) {
                    showResult(resultDiv, `✅ ${text}`, true);
                    // 签到成功后自动刷新用户信息
                    setTimeout(() => {
                        queryUser();
                    }, 500);
                } else if (response.status === 401) {
                    showResult(resultDiv, '❌ 签到失败：请先登录', false);
                } else {
                    showResult(resultDiv, `❌ ${text}`, false);
                }
            } catch (error) {
                showResult(resultDiv, `❌ 网络错误: ${error.message}`, false);
            }
        }

        // 查询用户
        async function queryUser() {
            const userId = document.getElementById('queryUserId').value;
            const resultDiv = document.getElementById('queryResult');
            const userDetailDiv = document.getElementById('userDetail');
            
            if (!userId) {
                showResult(resultDiv, '请输入用户ID', false);
                return;
            }

            resultDiv.innerHTML = '⏳ 查询中...';
            resultDiv.className = 'result';

            try {
                const response = await request(`${API_BASE}/${userId}`, 'GET');
                const data = await response.json();
                
                if (response.ok) {
                    showResult(resultDiv, '✅ 查询成功', true);
                    // 展示详细信息
                    userDetailDiv.innerHTML = `
                        📋 用户详细信息：
                        {
                            "id": ${data.id},
                            "name": "${data.name}",
                            "totalPoints": ${data.totalPoints || 0},
                            "createTime": "${data.createTime || '未知'}"
                        }
                    `;
                } else if (response.status === 401) {
                    showResult(resultDiv, '❌ 查询失败：请先登录', false);
                    userDetailDiv.innerHTML = '❌ 请先登录后再查询';
                } else {
                    showResult(resultDiv, `❌ 查询失败: ${JSON.stringify(data)}`, false);
                    userDetailDiv.innerHTML = '❌ 未找到该用户';
                }
            } catch (error) {
                showResult(resultDiv, `❌ 网络错误: ${error.message}`, false);
                userDetailDiv.innerHTML = `❌ 查询失败: ${error.message}`;
            }
        }

        // 显示结果
        function showResult(element, message, isSuccess) {
            element.innerHTML = message;
            element.className = isSuccess ? 'result success' : 'result error';
            
            // 3秒后自动清除样式但保留内容
            setTimeout(() => {
                if (element.className.includes('success') || element.className.includes('error')) {
                    element.className = 'result';
                }
            }, 3000);
        }
    </script>
</body>
</html>
