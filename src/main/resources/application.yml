spring:
  datasource:
    url: jdbc:mysql://localhost:3306/points_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

server:
  port: 8080

rocketmq:
  name-server: 'localhost:9876'
  producer:
    group: points-producer-group
    send-message-timeout: 3000

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example: DEBUG